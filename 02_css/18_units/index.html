<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Units Demo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>CSS Units Demonstration</h1>

<!-- px -->
<div class="box px">PX UNIT</div>

<!-- percentage -->
<div class="parent">
    <div class="box percent">PERCENT UNIT</div>
</div>

<!-- em -->
<div class="em-parent">
    <p class="em-text">This text uses EM unit</p>
</div>

<!-- rem -->
<p class="rem-text">This text uses REM unit</p>

<!-- viewport units -->
<div class="viewport-box">VW & VH UNIT</div>

<!-- vmin / vmax -->
<div class="vmin-box">VMIN UNIT</div>
<div class="vmax-box">VMAX UNIT</div>

<!-- ch -->
<input type="text" class="ch-input" placeholder="Width using ch unit">

<!-- ex -->
<p class="ex-text">This uses EX unit</p>

<!-- Grid FR unit -->
<div class="grid-container">
    <div class="grid-box">1fr</div>
    <div class="grid-box">2fr</div>
    <div class="grid-box">1fr</div>
</div>

</body>
</html>
